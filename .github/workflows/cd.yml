name: CD Pipeline

on:
  workflow_run:
    workflows: ["🚀 CI Pipeline"]
    types: [completed]
    branches: [main, deploy/avant-preprod, deploy/preprod]
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to deploy (leave empty for latest)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/messaging-service

jobs:
  update-deployment:
    if: ${{ github.event.workflow_run.event == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    name: Update Deployment Manifest

    permissions:
      contents: write
      packages: read

    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.ACTIONS_CD }}
          private_key: ${{ secrets.ACTIONS_CD_PRIVATE_KEY }}

      - name: Checkout messaging-service
        uses: actions/checkout@v4
        with:
          path: messaging-service
          ref: ${{ github.event.workflow_run.head_branch || 'main' }}
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate and determine commit SHA
        id: validate_commit
        working-directory: messaging-service
        run: |
          # Determine the commit SHA based on trigger type
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger - use input or current commit
            if [ -n "${{ inputs.commit_sha }}" ]; then
              COMMIT_SHA="${{ inputs.commit_sha }}"
              echo "Validating manually provided commit SHA: $COMMIT_SHA"
              
              # Validate SHA format (40 hex characters for full SHA or 7+ for short SHA)
              if ! echo "$COMMIT_SHA" | grep -qE '^[a-fA-F0-9]{7,40}$'; then
                echo "❌ Error: Invalid commit SHA format. Must be 7-40 hexadecimal characters."
                exit 1
              fi
              
              # Verify the commit exists in the repository
              if ! git rev-parse --verify "${COMMIT_SHA}^{commit}" >/dev/null 2>&1; then
                echo "❌ Error: Commit SHA '${COMMIT_SHA}' does not exist in the repository."
                echo "Please provide a valid commit SHA from the main branch."
                exit 1
              fi
              
              # Get the full SHA if a short SHA was provided
              COMMIT_SHA=$(git rev-parse --verify "${COMMIT_SHA}^{commit}")
              echo "✅ Commit SHA validated successfully"
              echo "Using manually provided commit SHA: $COMMIT_SHA"
            else
              COMMIT_SHA="${{ github.sha }}"
              echo "Using current commit SHA: $COMMIT_SHA"
            fi
          else
            # Automatic trigger from CI workflow
            COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
            # If empty, use github.sha as fallback
            if [ -z "$COMMIT_SHA" ]; then
              COMMIT_SHA="${{ github.sha }}"
              echo "Using github.sha as fallback: $COMMIT_SHA"
            fi
          fi

          # Store COMMIT_SHA as output for use in subsequent steps
          echo "commit_sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT

      - name: Verify image exists in registry
        run: |
          COMMIT_SHA="${{ steps.validate_commit.outputs.commit_sha }}"
          SHORT_SHA=$(printf "%.7s" "$COMMIT_SHA")
          IMAGE_TAG="sha-${SHORT_SHA}"
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          FULL_IMAGE=$(echo "${FULL_IMAGE}" | tr '[:upper:]' '[:lower:]')
          
          echo "Verifying image existence: ${FULL_IMAGE}"
          # We use docker manifest inspect which is available in modern docker versions
          if ! docker manifest inspect "${FULL_IMAGE}" > /dev/null 2>&1; then
            echo "❌ Error: Docker image ${FULL_IMAGE} not found in registry."
            echo "The CI pipeline might have failed to build or push the image for this commit."
            exit 1
          fi
          echo "✅ Image found in registry"

      - name: Determine trigger branch
        id: trigger_branch
        run: |
          TRIGGER_BRANCH="${{ github.event.workflow_run.head_branch || 'main' }}"
          echo "branch=${TRIGGER_BRANCH}" >> $GITHUB_OUTPUT
          if [ "$TRIGGER_BRANCH" = "main" ]; then
            echo "infra_branch=main" >> $GITHUB_OUTPUT
          else
            echo "infra_branch=deploy/preprod" >> $GITHUB_OUTPUT
          fi
          echo "Trigger branch: $TRIGGER_BRANCH"

      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: whispr-messenger/infrastructure
          path: infrastructure
          ref: ${{ steps.trigger_branch.outputs.infra_branch }}
          token: ${{ steps.generate_token.outputs.token }}

      - name: Validate manifest paths
        run: |
          TRIGGER_BRANCH="${{ steps.trigger_branch.outputs.branch }}"

          REQUIRED=(
            "infrastructure/k8s/whispr/preprod/messaging-service/deployment.yaml"
          )
          if [ "$TRIGGER_BRANCH" = "main" ]; then
            REQUIRED+=(
              "infrastructure/k8s/whispr/prod/messaging-service/deployment.yaml"
              "infrastructure/k8s/whispr/production/messaging-service/deployment.yaml"
            )
          fi

          for MANIFEST in "${REQUIRED[@]}"; do
            if [ ! -f "$MANIFEST" ]; then
              echo "❌ Error: Manifest not found at $MANIFEST"
              exit 1
            fi
            echo "✅ Manifest found at $MANIFEST"
          done

      - name: Update image tag in deployment
        id: update_image
        run: |
          TRIGGER_BRANCH="${{ steps.trigger_branch.outputs.branch }}"

          # Use the validated commit SHA from the previous step
          COMMIT_SHA="${{ steps.validate_commit.outputs.commit_sha }}"

          # Extract short SHA safely using printf (7 characters, matching docker metadata-action default)
          SHORT_SHA=$(printf "%.7s" "$COMMIT_SHA")

          # Use the short SHA tag format that matches the CI docker workflow
          IMAGE_TAG="sha-${SHORT_SHA}"

          # Build the full image reference with lowercase (OCI requirement)
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          FULL_IMAGE=$(echo "${FULL_IMAGE}" | tr '[:upper:]' '[:lower:]')

          echo "Commit SHA: $COMMIT_SHA"
          echo "Short SHA: $SHORT_SHA"
          echo "Image tag: $IMAGE_TAG"
          echo "Updating deployment image to: ${FULL_IMAGE}"

          # Always update preprod
          yq -i 'select(.kind == "Deployment").spec.template.spec.containers[0].image = "'"${FULL_IMAGE}"'"' infrastructure/k8s/whispr/preprod/messaging-service/deployment.yaml

          if [ "$TRIGGER_BRANCH" = "main" ]; then
            # prod/
            yq -i 'select(.kind == "Deployment").spec.template.spec.containers[0].image = "'"${FULL_IMAGE}"'"' infrastructure/k8s/whispr/prod/messaging-service/deployment.yaml

            # production/ (colleagues) — deployment + migration-job
            yq -i 'select(.kind == "Deployment").spec.template.spec.containers[0].image = "'"${FULL_IMAGE}"'"' infrastructure/k8s/whispr/production/messaging-service/deployment.yaml
            if [ -f "infrastructure/k8s/whispr/production/messaging-service/migration-job.yaml" ]; then
              yq -i 'select(.kind == "Job").spec.template.spec.containers[0].image = "'"${FULL_IMAGE}"'"' infrastructure/k8s/whispr/production/messaging-service/migration-job.yaml
            fi
          fi

      - name: Verify update
        run: |
          TRIGGER_BRANCH="${{ steps.trigger_branch.outputs.branch }}"

          echo "=== preprod/deployment.yaml ==="
          yq 'select(.kind == "Deployment").spec.template.spec.containers[0].image' infrastructure/k8s/whispr/preprod/messaging-service/deployment.yaml
          if [ "$TRIGGER_BRANCH" = "main" ]; then
            echo "=== prod/deployment.yaml ==="
            yq 'select(.kind == "Deployment").spec.template.spec.containers[0].image' infrastructure/k8s/whispr/prod/messaging-service/deployment.yaml
            echo "=== production/deployment.yaml ==="
            yq 'select(.kind == "Deployment").spec.template.spec.containers[0].image' infrastructure/k8s/whispr/production/messaging-service/deployment.yaml
          fi

      - name: Commit and push changes
        working-directory: infrastructure
        run: |
          TRIGGER_BRANCH="${{ steps.trigger_branch.outputs.branch }}"
          INFRA_BRANCH="${{ steps.trigger_branch.outputs.infra_branch }}"

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Check if there are changes to commit
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Use the validated commit SHA determined in the previous step
          COMMIT_SHA="${{ steps.validate_commit.outputs.commit_sha }}"
          SHORT_SHA=$(printf "%.7s" "$COMMIT_SHA")

          # Build commit message based on trigger type
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            COMMIT_MSG="🔧 chore(deploy/messaging-service): update image to ${SHORT_SHA} (manual trigger)"
          else
            COMMIT_MSG="🔧 chore(deploy/messaging-service): update image to ${SHORT_SHA}"
          fi

          git add -A k8s/whispr/
          git commit -m "${COMMIT_MSG}"

          # Push to the correct branch in infrastructure repo
          git pull origin "${INFRA_BRANCH}" --rebase
          git push https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/whispr-messenger/infrastructure.git HEAD:"${INFRA_BRANCH}"

      - name: Fast-forward deploy/preprod with main on infrastructure repo
        if: steps.trigger_branch.outputs.infra_branch == 'main'
        working-directory: infrastructure
        env:
          INFRA_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          # When the trigger branch is main, infra/main has been updated above.
          # ArgoCD preprod tracks infra/deploy/preprod, so fast-forward it from main.
          # Fast-forward only — never force-push, never delete the branch.
          git fetch origin main deploy/preprod
          git checkout deploy/preprod
          if git merge --ff-only origin/main; then
            git push "https://x-access-token:${INFRA_TOKEN}@github.com/whispr-messenger/infrastructure.git" deploy/preprod
            echo "✅ deploy/preprod fast-forwarded to main"
          else
            echo "::warning::Cannot fast-forward deploy/preprod from main (diverged). Manual merge required."
          fi
